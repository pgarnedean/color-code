<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .square-container {
            position: relative;
            /* 正方形の幅200px + (200px/3 * 2) = 約333px */
            width: 333.3px; 
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* エンター後に表示される帯（左右に1/3ずつ長い） */
        #inputBand {
            position: absolute;
            top: 0;
            width: 100%; /* 親要素(333.3px)いっぱいに広がる */
            height: 100%;
            display: none;
            z-index: 1;
            border-radius: 4px;
        }

        /* お題となる中央の正方形 */
        #targetSquare {
            width: 200px;
            height: 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 中央配置 */
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
        }

        /* 中央の一致率（％） */
        #scoreText {
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            margin-bottom: 10px;
        }

        /* 下部のカラーコード（答え） */
        #answerText {
            font-size: 20px; /* ％より少し小さい */
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 15px;
        }

        .input-container {
            margin-top: 40px;
            z-index: 2;
        }

        #colorInput {
            width: 240px;
            height: 50px;
            font-size: 24px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        #colorInput:focus {
            border-color: #888;
        }

        #colorInput:disabled {
            background-color: #fff;
            color: #333;
        }
    </style>
</head>
<body>

<div class="game-area">
    <div class="square-container">
        <div id="inputBand"></div>
        <div id="targetSquare">
            <span id="scoreText"></span>
            <span id="answerText"></span>
        </div>
    </div>
    <div class="input-container">
        <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';

    const targetSquare = document.getElementById('targetSquare');
    const inputBand = document.getElementById('inputBand');
    const answerText = document.getElementById('answerText');
    const scoreText = document.getElementById('scoreText');
    const inputField = document.getElementById('colorInput');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    // 色の一致率を計算する関数
    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        
        const diffR = Math.abs(r1 - r2);
        const diffG = Math.abs(g1 - g2);
        const diffB = Math.abs(b1 - b2);
        
        // 最大差分は 255 * 3。それに対する現在の差分の割合を出し、100から引く
        const totalDiff = (diffR + diffG + diffB) / (255 * 3);
        const matchPercent = (1 - totalDiff) * 100;
        return matchPercent.toFixed(1);
    }

    function initGame() {
        targetColor = generateRandomColor();
        targetSquare.style.backgroundColor = '#' + targetColor;
        
        answerText.textContent = '#' + targetColor;
        answerText.style.color = getContrastColor(targetColor);
        answerText.style.opacity = 0;

        scoreText.style.color = getContrastColor(targetColor);
        scoreText.style.opacity = 0;

        inputBand.style.display = 'none';

        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();

        isAnswered = false;
    }

    inputField.addEventListener('input', function() {
        let val = this.value;
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
        val = val.toUpperCase();
        val = val.replace(/[^0-9A-F]/g, '');
        this.value = val;
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (!isAnswered) {
                let userInput = inputField.value;
                
                // 6桁でない場合は入力を受け付けない
                if (userInput.length !== 6) return;

                // 判定表示
                inputBand.style.backgroundColor = '#' + userInput;
                inputBand.style.display = 'block';

                // 一致率の表示
                const match = calculateMatch(targetColor, userInput);
                scoreText.textContent = match + '%';
                scoreText.style.opacity = 1;

                // 答えの表示
                answerText.style.opacity = 1;

                inputField.disabled = true;
                isAnswered = true;
            } else {
                initGame();
            }
        }
    });

    initGame();
</script>

</body>
</html>
