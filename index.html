<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            touch-action: manipulation;
        }

        .game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            padding-bottom: 240px; /* キーボード領域を確保 */
        }

        #scoreText {
            font-size: clamp(32px, 7vh, 60px);
            font-weight: bold;
            color: #333;
            margin: 2vh 0;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            height: 1.2em;
        }
        #scoreText.show { opacity: 1; transform: translateY(0); }

        .square-container {
            display: flex;
            gap: 0;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 1.5vh;
            transition: gap 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #targetSquare, #userSquare {
            width: 28vh; 
            height: 28vh;
            max-width: 42vw; 
            max-height: 300px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
        }

        #targetSquare.unanswered {
            width: 38vh;
            height: 38vh;
            max-width: 85vw;
            max-height: 400px;
        }

        #userSquare {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            width: 0;
            margin-left: 0;
        }
        #userSquare.show {
            opacity: 1;
            transform: scale(1);
            width: 28vh;
            margin-left: 3vw;
        }

        #answerText, #userAnswerText {
            font-size: clamp(16px, 2.5vh, 24px);
            font-family: monospace;
            font-weight: bold;
            opacity: 0;
            position: absolute;
            bottom: 10%;
            transition: opacity 0.5s ease 0.2s;
        }

        #realtimeRow {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 5vh;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        #realtimeRow.show { opacity: 1; }

        #realtimeMatch {
            font-size: clamp(24px, 4.5vh, 40px);
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .input-container {
            margin-top: 1vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #colorInput {
            width: clamp(160px, 45vw, 320px);
            height: 60px;
            font-size: 32px;
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
        }

        .preview-container {
            width: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s;
        }
        .preview-container.active {
            width: 75px;
            margin-left: 15px;
        }

        #colorPreview {
            width: 60px; 
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ccc;
            box-sizing: border-box;
            background-color: transparent;
            transition: background-color 0.2s ease;
        }

        #adviceText {
            margin-top: 1.5vh;
            font-size: 14px;
            color: #444;
            text-align: center;
            width: 95%;
            max-width: 500px;
            font-weight: bold;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            min-height: 4.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #adviceText.show { opacity: 1; transform: translateY(0); }

        /* スマホ版キーボード固定 */
        #customKeyboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            background: #eee;
            box-sizing: border-box;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-top: 1px solid #ddd;
            z-index: 100;
        }

        @media (min-width: 769px) {
            #customKeyboard { position: static; transform: none; background: transparent; border: none; margin-top: 20px; }
            .game-area { padding-bottom: 20px; justify-content: center; }
        }

        .key-btn {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 22px;
            font-family: monospace;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #bbb;
            transition: active 0.05s;
            -webkit-tap-highlight-color: transparent; 
        }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #bbb; }
        .key-del { background: #ffebee; border-color: #ffcdd2; color: #d32f2f; box-shadow: 0 3px 0 #ffcdd2; grid-column: span 2; }
        .key-enter { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; box-shadow: 0 3px 0 #c8e6c9; grid-column: span 2; }
    </style>
</head>
<body>

<div class="game-area">
    <div id="scoreText"></div>
    
    <div class="square-container" id="squaresWrapper">
        <div id="targetSquare" class="unanswered">
            <span id="answerText"></span>
        </div>
        <div id="userSquare">
            <span id="userAnswerText"></span>
        </div>
    </div>

    <div id="realtimeRow">
        <span id="realtimeMatch"></span>
    </div>
    
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
            <div class="preview-container" id="previewContainer">
                <div id="colorPreview"></div>
            </div>
        </div>
        <div id="adviceText"></div>
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button><button class="key-btn">1</button><button class="key-btn">2</button><button class="key-btn">3</button>
        <button class="key-btn">4</button><button class="key-btn">5</button><button class="key-btn">6</button><button class="key-btn">7</button>
        <button class="key-btn">8</button><button class="key-btn">9</button><button class="key-btn">A</button><button class="key-btn">B</button>
        <button class="key-btn">C</button><button class="key-btn">D</button><button class="key-btn">E</button><button class="key-btn">F</button>
        <button class="key-btn key-del">DEL</button><button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';
    let delTimer = null;

    const targetSquare = document.getElementById('targetSquare');
    const answerText = document.getElementById('answerText');
    const userSquare = document.getElementById('userSquare');
    const userAnswerText = document.getElementById('userAnswerText');
    const scoreText = document.getElementById('scoreText');
    const realtimeRow = document.getElementById('realtimeRow');
    const realtimeMatch = document.getElementById('realtimeMatch');
    const inputField = document.getElementById('colorInput');
    const previewContainer = document.getElementById('previewContainer');
    const colorPreview = document.getElementById('colorPreview');
    const adviceText = document.getElementById('adviceText');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16), g = parseInt(hex.substring(2, 4), 16), b = parseInt(hex.substring(4, 6), 16);
        return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        const distance = Math.sqrt(Math.pow(r1-r2, 2) + Math.pow(g1-g2, 2) + Math.pow(b1-b2, 2));
        const maxDistance = Math.sqrt(3 * Math.pow(255, 2));
        return (Math.max(0, (1 - (distance / maxDistance)) * 100)).toFixed(1);
    }

    function getDetailedAdvice(targetHex, userHex) {
        const tr = parseInt(targetHex.substring(0, 2), 16), tg = parseInt(targetHex.substring(2, 4), 16), tb = parseInt(targetHex.substring(4, 6), 16);
        const ur = parseInt(userHex.substring(0, 2), 16), ug = parseInt(userHex.substring(2, 4), 16), ub = parseInt(userHex.substring(4, 6), 16);
        const match = parseFloat(calculateMatch(targetHex, userHex));

        const dr = tr - ur, dg = tg - ug, db = tb - ub;
        const uMax = Math.max(ur, ug, ub), uMin = Math.min(ur, ug, ub);
        const tMax = Math.max(tr, tg, tb), tMin = Math.min(tr, tg, tb);
        const uSat = uMax - uMin, tSat = tMax - tMin;

        // 特殊条件
        if (match >= 99.5) return "【神業】もはや誤差なし！完璧な色彩感覚です。";
        if (match >= 98) return "【超惜しい】あとほんの数値を調整するだけ！(明度・彩度ともにほぼ完璧)";
        
        // 15個から35個以上へ大幅拡張
        if (tr < 30 && tg < 30 && tb < 30 && uMax > 100) return "【明度DOWN】正解は漆黒に近いです。全ての値を0方向へ！";
        if (tr > 230 && tg > 230 && tb > 230 && uMin < 150) return "【明度UP】正解はほぼ白です。全ての値をF方向へ一気に上げましょう。";
        
        if (tSat < 20 && uSat > 50) return "【彩度DOWN】正解はかなり無機質なグレー系です。RGBの差を無くしましょう。";
        if (tSat > 150 && uSat < 80) return "【彩度UP】もっと「派手」な色です。一番高い値を大きく、低い値をより小さく！";

        if (dr > 100 && dg > 100 && db < 30) return "【色相：黄】黄色みが圧倒的に足りません！R(左)とG(中)を大幅に増やしましょう。";
        if (dr > 100 && db > 100 && dg < 30) return "【色相：紫】マゼンタ(紫)が足りません。R(左)とB(右)を強く、G(中)を弱く。";
        if (dg > 100 && db > 100 && dr < 30) return "【色相：水】シアン(水色)が足りません。G(中)とB(右)を強化、R(左)を削って。";

        if (tr > tg && tr > tb && ur < 100) return "【暖色化】もっと暖かみのある色です。R(左)を増やして「熱」を足しましょう。";
        if (tb > tr && tb > tg && ub < 100) return "【寒色化】もっと冷たい色です。B(右)を増やして「涼しさ」を出しましょう。";
        
        if (tr > 80 && tg > 50 && tb < 50 && ur < 50) return "【ブラウン】茶色っぽくするにはRを中程度、Gをその半分、Bをほぼ0にします。";
        if (tr > 200 && tg < 150 && tb > 150 && ur < 150) return "【ピンク】もっと可愛らしい桃色。Rを最大級に、Bを少し混ぜて明度を上げます。";
        if (tr < 100 && tg > 150 && tb < 100 && ug < 100) return "【ライム】鮮やかな黄緑。Gを最大に、Rも少し足すと発色が良くなります。";
        if (tr > 150 && tg > 100 && tb < 80 && ur < 150) return "【オレンジ】Rを最大、Gを半分くらいにすると綺麗な橙色になります。";

        if (Math.abs(dr) < 15 && Math.abs(dg) < 15 && Math.abs(db) < 15) return "【微調整】方向性は合ってます！各値を1段階(1〜2)だけ動かしてみて。";
        
        if (uMax > 200 && tMax < 150) return "【明度DOWN】全体的に眩しすぎます。RGB全ての値を数段階下げて落ち着かせて。";
        if (uMin < 50 && tMin > 100) return "【明度UP】色が沈みすぎています。全体に光を当てるイメージで値を底上げして。";

        if (dr > 50) return "【赤不足】左2文字が小さいです。もっと赤み(R)を足して色相をずらしましょう。";
        if (dr < -50) return "【赤過剰】左2文字が大きすぎ。赤みを抑えると、より正解に近づきます。";
        if (dg > 50) return "【緑不足】真ん中2文字を大きく。緑(G)を足すと色に明るさと鮮やかさが出ます。";
        if (dg < -50) return "【緑過剰】真ん中を小さく。緑が強すぎて色が偏っています。";
        if (db > 50) return "【青不足】右2文字を大きく。青(B)を足して深みや冷たさを強調しましょう。";
        if (db < -50) return "【青過剰】右2文字が強すぎ。青を引いて、他の色の主張を強めてみて。";

        if (match < 50) return "【ヒント】まずは「明るさ」を合わせ、次に「一番強い色」を特定しましょう。";
        if (match < 70) return "【ヒント】RGBのどれか一つを極端に大きく(F)か小さく(0)すると見えてくるかも。";
        if (match < 85) return "【彩度】正解はもっと「くすんだ」色ですか？それとも「澄んだ」色ですか？";
        
        if (tMax === tr && dr > 20) return "【色相】一番強い成分は「赤」です。Rをもっと攻めてみましょう。";
        if (tMax === tg && dg > 20) return "【色相】一番強い成分は「緑」です。Gをもっと攻めてみましょう。";
        if (tMax === tb && db > 20) return "【色相】一番強い成分は「青」です。Bをもっと攻めてみましょう。";

        return "【あと一歩】明るさは近いです。RGBの比率を少しずつ変えて探りましょう。";
    }

    function updatePreview() {
        const val = inputField.value;
        if (val.length === 6) {
            colorPreview.style.backgroundColor = '#' + val;
            previewContainer.classList.add('active');
            if (isAnswered) {
                const match = calculateMatch(targetColor, val);
                realtimeMatch.textContent = match + '%';
                adviceText.textContent = getDetailedAdvice(targetColor, val);
            }
        } else {
            previewContainer.classList.remove('active');
            if (isAnswered) realtimeMatch.textContent = '---%';
        }
    }

    function initGame() {
        isAnswered = false;
        targetColor = generateRandomColor();
        scoreText.classList.remove('show');
        adviceText.classList.remove('show');
        realtimeRow.classList.remove('show');
        userSquare.classList.remove('show');
        targetSquare.classList.add('unanswered');
        answerText.style.opacity = 0;
        userAnswerText.style.opacity = 0;

        setTimeout(() => {
            targetSquare.style.backgroundColor = '#' + targetColor;
            answerText.textContent = '#' + targetColor;
            answerText.style.color = getContrastColor(targetColor);
            inputField.value = '';
            updatePreview();
            inputField.focus();
        }, 200);
    }

    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; 

            isAnswered = true;
            const match = calculateMatch(targetColor, userInput);
            scoreText.textContent = match + '%';
            scoreText.classList.add('show');
            adviceText.textContent = getDetailedAdvice(targetColor, userInput);
            adviceText.classList.add('show');

            targetSquare.classList.remove('unanswered');
            answerText.style.opacity = 1;

            userSquare.style.backgroundColor = '#' + userInput;
            userAnswerText.textContent = '#' + userInput;
            userAnswerText.style.color = getContrastColor(userInput);
            userAnswerText.style.opacity = 1;
            userSquare.classList.add('show');

            realtimeMatch.textContent = match + '%';
            realtimeRow.classList.add('show');
        } else {
            initGame();
        }
    }

    inputField.addEventListener('input', function() {
        let val = this.value;
        val = val.toUpperCase().replace(/[^0-9A-F]/g, '');
        this.value = val.substring(0, 6);
        updatePreview(); 
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleEnter(); });

    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            e.preventDefault();
            const keyText = btn.textContent;
            if (keyText === 'Enter') {
                handleEnter();
            } else if (keyText === 'DEL') {
                const start = inputField.selectionStart, val = inputField.value;
                if (start > 0) {
                    inputField.value = val.slice(0, start - 1) + val.slice(start);
                    inputField.setSelectionRange(start - 1, start - 1);
                }
                updatePreview();
                delTimer = setTimeout(() => { inputField.value = ''; updatePreview(); }, 600);
            } else if (inputField.value.length < 6) {
                const start = inputField.selectionStart, val = inputField.value;
                inputField.value = val.slice(0, start) + keyText + val.slice(start);
                inputField.setSelectionRange(start + 1, start + 1);
                updatePreview();
            }
        });
        btn.addEventListener('pointerup', () => clearTimeout(delTimer));
    });

    initGame();
</script>

</body>
</html>
