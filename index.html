<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .square-container {
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
        }

        /* エンター後に表示される画面端まで広がる帯 */
        #inputBand {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }

        /* お題となる中央の正方形 */
        #targetSquare {
            width: 200px;
            height: 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2; /* 帯より手前に表示 */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            box-sizing: border-box;
            border-radius: 4px; /* お好みで削除可能 */
        }

        /* 答えのカラーコードテキスト */
        #answerText {
            font-size: 24px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .input-container {
            margin-top: 40px;
            z-index: 2;
        }

        #colorInput {
            width: 240px;
            height: 50px;
            font-size: 24px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        #colorInput:focus {
            border-color: #888;
        }

        #colorInput:disabled {
            background-color: #fff;
            color: #333;
            border-color: #ccc;
        }
    </style>
</head>
<body>

<div class="game-area">
    <div class="square-container">
        <div id="inputBand"></div>
        <div id="targetSquare">
            <span id="answerText"></span>
        </div>
    </div>
    <div class="input-container">
        <input type="text" id="colorInput" maxlength="6" placeholder="XXXXXX" autocomplete="off" autofocus>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';

    const targetSquare = document.getElementById('targetSquare');
    const inputBand = document.getElementById('inputBand');
    const answerText = document.getElementById('answerText');
    const inputField = document.getElementById('colorInput');

    // ランダムな6桁のカラーコードを生成する関数
    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    // 色の明るさ（輝度）を計算し、見やすい文字色（白か黒）を返す関数
    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        // YIQ式を用いた輝度計算
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    // ゲームを初期状態にリセットする関数
    function initGame() {
        targetColor = generateRandomColor();
        targetSquare.style.backgroundColor = '#' + targetColor;
        
        answerText.textContent = '#' + targetColor;
        answerText.style.color = getContrastColor(targetColor);
        answerText.style.opacity = 0;

        inputBand.style.display = 'none';

        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();

        isAnswered = false;
    }

    // 入力制限と自動変換処理
    inputField.addEventListener('input', function() {
        let val = this.value;

        // 全角英数字を半角に変換
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });

        // 小文字を大文字に変換
        val = val.toUpperCase();

        // 指定文字（0-9, A-F）以外を削除
        val = val.replace(/[^0-9A-F]/g, '');

        this.value = val;
    });

    // エンターキー押下時の処理
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (!isAnswered) {
                // 解答フェーズ
                let userInput = inputField.value;
                if (userInput.length === 0) return; // 空欄なら何もしない

                // 万が一入力が6桁未満の場合は0で埋める
                userInput = userInput.padEnd(6, '0');

                // 帯を入力された色にして表示
                inputBand.style.backgroundColor = '#' + userInput;
                inputBand.style.display = 'block';

                // 答えの表示
                answerText.style.opacity = 1;

                // 入力欄を無効化
                inputField.disabled = true;
                isAnswered = true;
            } else {
                // リセットフェーズ（次へ）
                initGame();
            }
        }
    });

    // ページ読み込み時にゲームを開始
    initGame();
</script>

</body>
</html>
