<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .square-container {
            position: relative;
            width: 333.3px; 
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #inputBand {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
            border-radius: 4px;
        }

        #targetSquare {
            width: 200px;
            height: 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
        }

        #scoreText {
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            margin-bottom: 10px;
        }

        #answerText {
            font-size: 20px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 15px;
        }

        .input-container {
            margin-top: 30px;
            z-index: 2;
        }

        #colorInput {
            width: 240px;
            height: 50px;
            font-size: 28px;
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            background-color: #fff;
        }

        #colorInput:focus {
            border-color: #888;
        }

        #colorInput:disabled {
            background-color: #eee;
            color: #333;
        }

        /* --- 専用キーボードのスタイル --- */
        #customKeyboard {
            display: none; /* デフォルト（PC等）では非表示 */
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 20px;
            width: 100%;
            max-width: 320px;
        }

        /* 画面幅が768px以下（スマホ等）の場合のみキーボードを表示 */
        @media (max-width: 768px) {
            #customKeyboard {
                display: grid;
            }
        }

        .key-btn {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 22px;
            font-family: monospace;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #ddd;
            transition: all 0.1s;
            /* スマホでのタップ時のハイライトを無効化 */
            -webkit-tap-highlight-color: transparent; 
        }

        .key-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #ddd;
        }

        .key-del {
            grid-column: span 2; /* 2マス分の幅 */
            background: #ffebee;
            border-color: #ffcdd2;
            color: #d32f2f;
            box-shadow: 0 3px 0 #ffcdd2;
        }
        .key-del:active { box-shadow: 0 0 0 #ffcdd2; }

        .key-enter {
            grid-column: span 2; /* 2マス分の幅 */
            background: #e8f5e9;
            border-color: #c8e6c9;
            color: #2e7d32;
            box-shadow: 0 3px 0 #c8e6c9;
        }
        .key-enter:active { box-shadow: 0 0 0 #c8e6c9; }

    </style>
</head>
<body>

<div class="game-area">
    <div class="square-container">
        <div id="inputBand"></div>
        <div id="targetSquare">
            <span id="scoreText"></span>
            <span id="answerText"></span>
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button>
        <button class="key-btn">1</button>
        <button class="key-btn">2</button>
        <button class="key-btn">3</button>
        
        <button class="key-btn">4</button>
        <button class="key-btn">5</button>
        <button class="key-btn">6</button>
        <button class="key-btn">7</button>
        
        <button class="key-btn">8</button>
        <button class="key-btn">9</button>
        <button class="key-btn">A</button>
        <button class="key-btn">B</button>
        
        <button class="key-btn">C</button>
        <button class="key-btn">D</button>
        <button class="key-btn">E</button>
        <button class="key-btn">F</button>
        
        <button class="key-btn key-del">DEL</button>
        <button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';

    const targetSquare = document.getElementById('targetSquare');
    const inputBand = document.getElementById('inputBand');
    const answerText = document.getElementById('answerText');
    const scoreText = document.getElementById('scoreText');
    const inputField = document.getElementById('colorInput');
    const customKeyboard = document.getElementById('customKeyboard');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        const diffR = Math.abs(r1 - r2);
        const diffG = Math.abs(g1 - g2);
        const diffB = Math.abs(b1 - b2);
        const totalDiff = (diffR + diffG + diffB) / (255 * 3);
        const matchPercent = (1 - totalDiff) * 100;
        return matchPercent.toFixed(1);
    }

    // ゲームリセット処理
    function initGame() {
        targetColor = generateRandomColor();
        targetSquare.style.backgroundColor = '#' + targetColor;
        answerText.textContent = '#' + targetColor;
        answerText.style.color = getContrastColor(targetColor);
        answerText.style.opacity = 0;
        scoreText.style.color = getContrastColor(targetColor);
        scoreText.style.opacity = 0;
        inputBand.style.display = 'none';
        
        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();

        // キーボードを有効化
        customKeyboard.style.opacity = '1';
        customKeyboard.style.pointerEvents = 'auto';

        isAnswered = false;
    }

    // エンター（解答＆次へ）の共通処理
    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; // 6桁以外は無効

            inputBand.style.backgroundColor = '#' + userInput;
            inputBand.style.display = 'block';

            const match = calculateMatch(targetColor, userInput);
            scoreText.textContent = match + '%';
            scoreText.style.opacity = 1;
            answerText.style.opacity = 1;

            inputField.disabled = true;
            
            // キーボードを無効化（半透明にして押せなくする）
            customKeyboard.style.opacity = '0.5';
            customKeyboard.style.pointerEvents = 'none';
            
            isAnswered = true;
        } else {
            initGame();
        }
    }

    // パソコンの物理キーボード入力制限処理
    inputField.addEventListener('input', function() {
        let val = this.value;
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
        val = val.toUpperCase();
        val = val.replace(/[^0-9A-F]/g, '');
        if (val.length > 6) val = val.substring(0, 6);
        this.value = val;
    });

    // パソコンのエンターキー監視
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            handleEnter();
        }
    });

    // 専用キーボードのボタンクリック処理
    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            // フォーカスが外れるのを防ぐ（PC等での挙動安定のため）
            e.preventDefault(); 
            
            const keyText = this.textContent;

            if (keyText === 'DEL') {
                // 1文字削除
                inputField.value = inputField.value.slice(0, -1);
            } else if (keyText === 'Enter') {
                // エンター処理
                handleEnter();
            } else {
                // 文字入力（6桁未満の場合のみ追加）
                if (inputField.value.length < 6) {
                    inputField.value += keyText;
                }
            }
        });
    });

    initGame();
</script>

</body>
</html>
