<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        #scoreText {
            font-size: clamp(32px, 8vh, 60px);
            font-weight: bold;
            display: none; /* 未回答時は非表示にして中央寄せを維持 */
            color: #333;
            margin-bottom: 2vh;
            transition: opacity 0.3s;
        }

        .square-container {
            display: flex;
            gap: 3vw;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 3vh;
        }

        #targetSquare, #userSquare {
            width: 35vh; 
            height: 35vh;
            max-width: 40vw; 
            max-height: 400px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        #targetSquare.unanswered {
            width: 45vh;
            height: 45vh;
            max-width: 80vw;
            max-height: 500px;
        }

        #userSquare {
            display: none;
        }

        #answerText, #userAnswerText {
            font-size: clamp(18px, 4vh, 32px);
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 10%;
            transition: opacity 0.3s;
        }

        #realtimeRow {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 8vh;
            margin-top: 1vh;
        }

        #realtimeCode {
            font-family: monospace;
            font-size: clamp(20px, 4vh, 34px);
            font-weight: bold;
            color: #333;
            margin-right: 20px;
        }

        #realtimeMatch {
            font-size: clamp(24px, 5vh, 40px);
            font-weight: bold;
            color: #333;
        }

        .input-container {
            margin-top: 2vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; 
        }

        #colorInput {
            width: clamp(200px, 40vw, 400px);
            height: clamp(50px, 8vh, 80px);
            font-size: clamp(24px, 5vh, 42px);
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            background-color: #fff;
        }

        #colorPreview {
            width: clamp(50px, 8vh, 80px); 
            height: clamp(50px, 8vh, 80px);
            border-radius: 50%;
            border: 2px solid #ccc;
            box-sizing: border-box;
            display: none; /* 6桁未満は非表示にして入力を中央に */
            transition: background-color 0.2s;
        }

        #adviceText {
            margin-top: 1.5vh;
            font-size: clamp(14px, 2.5vh, 20px);
            color: #444;
            text-align: center;
            width: 90%;
            max-width: 600px;
            display: none; /* 未回答時は非表示 */
            font-weight: bold;
            line-height: 1.4;
        }

        #customKeyboard {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            max-width: 320px;
        }

        @media (max-width: 768px) {
            #customKeyboard {
                display: grid;
            }
        }

        @media (max-height: 750px), (max-width: 400px) {
            #targetSquare.unanswered { width: 160px; height: 160px; }
            #targetSquare, #userSquare { width: 130px; height: 130px; }
            #answerText, #userAnswerText { font-size: 20px; bottom: 15px; }
            .square-container { gap: 10px; margin-bottom: 5px; }
            #colorInput { width: 220px; height: 50px; font-size: 26px; }
            #colorPreview { width: 50px; height: 50px; }
            #realtimeRow { height: 50px; margin-top: 5px; }
            #adviceText { margin-top: 5px; font-size: 13px; }
            .key-btn { padding: 10px 0; font-size: 20px; }
            .input-container { margin-top: 10px; }
            body { overflow-y: auto; }
        }

        .key-btn {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 22px;
            font-family: monospace;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #ddd;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent; 
        }

        .key-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #ddd;
        }

        .key-del {
            grid-column: span 2;
            background: #ffebee;
            border-color: #ffcdd2;
            color: #d32f2f;
            box-shadow: 0 3px 0 #ffcdd2;
        }
        .key-del:active { box-shadow: 0 0 0 #ffcdd2; }

        .key-enter {
            grid-column: span 2;
            background: #e8f5e9;
            border-color: #c8e6c9;
            color: #2e7d32;
            box-shadow: 0 3px 0 #c8e6c9;
        }
        .key-enter:active { box-shadow: 0 0 0 #c8e6c9; }

    </style>
</head>
<body>

<div class="game-area">
    <div id="scoreText"></div>
    
    <div class="square-container" id="squaresWrapper">
        <div id="targetSquare" class="unanswered">
            <span id="answerText"></span>
        </div>
        <div id="userSquare">
            <span id="userAnswerText"></span>
        </div>
    </div>

    <div id="realtimeRow">
        <span id="realtimeCode"></span>
        <span id="realtimeMatch"></span>
    </div>
    
    <div class="input-container">
        <div class="input-wrapper" id="inputWrapper">
            <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
            <div id="colorPreview"></div>
        </div>
        <div id="adviceText"></div>
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button>
        <button class="key-btn">1</button>
        <button class="key-btn">2</button>
        <button class="key-btn">3</button>
        
        <button class="key-btn">4</button>
        <button class="key-btn">5</button>
        <button class="key-btn">6</button>
        <button class="key-btn">7</button>
        
        <button class="key-btn">8</button>
        <button class="key-btn">9</button>
        <button class="key-btn">A</button>
        <button class="key-btn">B</button>
        
        <button class="key-btn">C</button>
        <button class="key-btn">D</button>
        <button class="key-btn">E</button>
        <button class="key-btn">F</button>
        
        <button class="key-btn key-del">DEL</button>
        <button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';
    let delTimer = null;

    const targetSquare = document.getElementById('targetSquare');
    const answerText = document.getElementById('answerText');
    const userSquare = document.getElementById('userSquare');
    const userAnswerText = document.getElementById('userAnswerText');
    const scoreText = document.getElementById('scoreText');
    
    const realtimeRow = document.getElementById('realtimeRow');
    const realtimeCode = document.getElementById('realtimeCode');
    const realtimeMatch = document.getElementById('realtimeMatch');
    
    const inputWrapper = document.getElementById('inputWrapper');
    const inputField = document.getElementById('colorInput');
    const colorPreview = document.getElementById('colorPreview');
    const adviceText = document.getElementById('adviceText');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        const diffR = r1 - r2, diffG = g1 - g2, diffB = b1 - b2;
        const distance = Math.sqrt(diffR * diffR + diffG * diffG + diffB * diffB);
        const maxDistance = Math.sqrt(255 * 255 + 255 * 255 + 255 * 255);
        let matchPercent = (1 - (distance / maxDistance)) * 100;
        return (matchPercent < 0 ? 0 : matchPercent).toFixed(1);
    }

    function getAdvice(targetHex, userHex) {
        const tr = parseInt(targetHex.substring(0, 2), 16), tg = parseInt(targetHex.substring(2, 4), 16), tb = parseInt(targetHex.substring(4, 6), 16);
        const ur = parseInt(userHex.substring(0, 2), 16), ug = parseInt(userHex.substring(2, 4), 16), ub = parseInt(userHex.substring(4, 6), 16);
        const diffR = tr - ur, diffG = tg - ug, diffB = tb - ub;
        const absR = Math.abs(diffR), absG = Math.abs(diffG), absB = Math.abs(diffB);
        const maxDiff = Math.max(absR, absG, absB);

        if (maxDiff === 0) return "完璧です！100%一致！カラーコードの達人ですね！";
        if (Math.abs((tr + tg + tb) - (ur + ug + ub)) > 200 && maxDiff < 100) {
            return (tr + tg + tb) > (ur + ug + ub) ? "全体的にもっと明るい色でした。RGBすべての数字を大きく（F寄りに）してみましょう！" : "全体的にもっと暗い色でした。RGBすべての数字を小さく（0寄りに）してみましょう！";
        }
        if (Math.abs(tr - tg) < 20 && Math.abs(tg - tb) < 20 && maxDiff > 30) {
            return "正解は無彩色（グレー・白・黒）に近い色でした！3つの値をもっと均等にしてみましょう！";
        }
        if (maxDiff === absR) return diffR > 0 ? "もう少し赤みが必要でしたね。左の2文字を大きく（9やA〜Fへ）してみましょう。" : "赤みが強すぎたようです。左の2文字をもっと0に近づけてみましょう。";
        if (maxDiff === absG) return diffG > 0 ? "もう少し緑色が必要でした。真ん中の2文字を大きく（9やA〜Fへ）してみましょう。" : "緑が強すぎたようです。真ん中の2文字をもっと0に近づけてみましょう。";
        return diffB > 0 ? "もう少し青みが必要でした。右の2文字を大きく（9やA〜Fへ）してみましょう。" : "青が強すぎたようです。右の2文字をもっと0に近づけてみましょう。";
    }

    function updatePreview() {
        const val = inputField.value;
        if (val.length === 6) {
            colorPreview.style.backgroundColor = '#' + val;
            colorPreview.style.display = 'block'; // 6桁の時だけ表示
            if (isAnswered) {
                const match = calculateMatch(targetColor, val);
                realtimeCode.textContent = '#' + val;
                realtimeMatch.textContent = match + '%';
            }
        } else {
            colorPreview.style.display = 'none'; // 6桁未満は非表示にして中央維持
            if (isAnswered) {
                realtimeCode.textContent = '';
                realtimeMatch.textContent = '';
            }
        }
    }

    function initGame() {
        targetColor = generateRandomColor();
        targetSquare.style.backgroundColor = '#' + targetColor;
        answerText.textContent = '#' + targetColor;
        answerText.style.color = getContrastColor(targetColor);
        answerText.style.opacity = 0;
        
        targetSquare.classList.add('unanswered');
        userSquare.style.display = 'none';
        
        // レイアウトを中央に戻すため非表示にする
        scoreText.style.display = 'none';
        scoreText.style.opacity = 0;
        adviceText.style.display = 'none';
        adviceText.style.opacity = 0;
        realtimeRow.style.display = 'none';

        inputWrapper.appendChild(colorPreview);
        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();

        updatePreview();
        isAnswered = false;
    }

    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; 

            const match = calculateMatch(targetColor, userInput);
            scoreText.textContent = match + '%';
            scoreText.style.display = 'block'; // 結果表示
            setTimeout(() => scoreText.style.opacity = 1, 10);

            targetSquare.classList.remove('unanswered');
            answerText.style.opacity = 1;

            userSquare.style.display = 'flex';
            userSquare.style.backgroundColor = '#' + userInput;
            userAnswerText.textContent = '#' + userInput;
            userAnswerText.style.color = getContrastColor(userInput);
            userAnswerText.style.opacity = 1;

            realtimeRow.style.display = 'flex';
            realtimeRow.insertBefore(colorPreview, realtimeRow.firstChild);
            colorPreview.style.display = 'block';
            
            realtimeCode.textContent = '#' + userInput;
            realtimeMatch.textContent = match + '%';

            adviceText.textContent = getAdvice(targetColor, userInput);
            adviceText.style.display = 'block'; // アドバイス表示
            setTimeout(() => adviceText.style.opacity = 1, 10);
            
            isAnswered = true;
        } else {
            initGame();
        }
    }

    inputField.addEventListener('input', function() {
        let val = this.value;
        const start = this.selectionStart;
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).toUpperCase().replace(/[^0-9A-F]/g, '');
        this.value = val.substring(0, 6);
        this.setSelectionRange(start, start); 
        updatePreview(); 
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleEnter(); });

    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('mousedown', e => e.preventDefault());
        if (btn.classList.contains('key-del')) {
            const clearInput = () => { inputField.value = ''; updatePreview(); };
            const deleteChar = () => {
                const start = inputField.selectionStart, val = inputField.value;
                if (start > 0) {
                    inputField.value = val.slice(0, start - 1) + val.slice(start);
                    inputField.setSelectionRange(start - 1, start - 1);
                }
                updatePreview();
            };
            btn.addEventListener('touchstart', e => { e.preventDefault(); delTimer = setTimeout(clearInput, 600); });
            btn.addEventListener('touchend', e => { e.preventDefault(); if(delTimer){ clearTimeout(delTimer); deleteChar(); delTimer=null; } });
            btn.addEventListener('mousedown', e => { delTimer = setTimeout(clearInput, 600); });
            btn.addEventListener('mouseup', e => { if(delTimer){ clearTimeout(delTimer); deleteChar(); delTimer=null; } });
        } else {
            btn.addEventListener('click', function(e) {
                e.preventDefault(); 
                const keyText = this.textContent;
                if (keyText === 'Enter') {
                    handleEnter();
                } else if (inputField.value.length < 6) {
                    const start = inputField.selectionStart, val = inputField.value;
                    inputField.value = val.slice(0, start) + keyText + val.slice(start);
                    inputField.setSelectionRange(start + 1, start + 1);
                    updatePreview(); 
                }
            });
        }
    });

    initGame();
</script>

</body>
</html>
