<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            touch-action: manipulation;
        }

        .game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        /* スコア表示（中央配置） */
        #scoreText {
            font-size: clamp(32px, 8vh, 60px);
            font-weight: bold;
            color: #333;
            margin-bottom: 2vh;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            height: 1.2em;
        }
        #scoreText.show {
            opacity: 1;
            transform: translateY(0);
        }

        .square-container {
            display: flex;
            gap: 0;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 2vh;
            transition: gap 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #targetSquare, #userSquare {
            width: 30vh; 
            height: 30vh;
            max-width: 40vw; 
            max-height: 350px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
        }

        #targetSquare.unanswered {
            width: 40vh;
            height: 40vh;
            max-width: 80vw;
            max-height: 450px;
        }

        #userSquare {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            width: 0;
            margin-left: 0;
        }
        #userSquare.show {
            opacity: 1;
            transform: scale(1);
            width: 30vh;
            margin-left: 3vw;
        }

        #answerText, #userAnswerText {
            font-size: clamp(16px, 3vh, 28px);
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 10%;
            transition: opacity 0.5s ease 0.2s;
        }

        /* リアルタイム表示（%のみ中央に表示） */
        #realtimeRow {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 6vh;
            margin-top: 1vh;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        #realtimeRow.show { opacity: 1; }

        #realtimeMatch {
            font-size: clamp(24px, 5vh, 40px);
            font-weight: bold;
            color: #333;
            text-align: center;
            transition: color 0.3s ease;
        }

        .input-container {
            margin-top: 1vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #colorInput {
            width: clamp(180px, 40vw, 350px);
            height: clamp(45px, 7vh, 70px);
            font-size: clamp(22px, 4vh, 38px);
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
            transition: border-color 0.3s;
        }

        .preview-container {
            width: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s;
        }
        .preview-container.active {
            width: clamp(60px, 9vh, 90px);
            margin-left: 15px;
        }

        #colorPreview {
            width: clamp(45px, 7vh, 70px); 
            height: clamp(45px, 7vh, 70px);
            border-radius: 50%;
            border: 2px solid #ccc;
            box-sizing: border-box;
            background-color: transparent;
            transition: background-color 0.2s ease;
        }

        #adviceText {
            margin-top: 1.5vh;
            font-size: clamp(12px, 2vh, 18px);
            color: #444;
            text-align: center;
            width: 95%;
            max-width: 600px;
            font-weight: bold;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            min-height: 3em;
        }
        #adviceText.show { opacity: 1; transform: translateY(0); }

        /* キーボードのサイズを固定 */
        #customKeyboard {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 10px;
            width: 100%;
            max-width: 320px;
            min-height: 180px; /* 高さを固定 */
        }

        @media (max-width: 768px) { 
            #customKeyboard { display: grid; } 
            .game-area { justify-content: flex-start; padding-top: 20px; }
        }

        .key-btn {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 20px;
            font-family: monospace;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #ddd;
            transition: transform 0.05s, box-shadow 0.05s;
            -webkit-tap-highlight-color: transparent; 
        }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ddd; }
        .key-del { background: #ffebee; border-color: #ffcdd2; color: #d32f2f; box-shadow: 0 3px 0 #ffcdd2; grid-column: span 2; }
        .key-enter { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; box-shadow: 0 3px 0 #c8e6c9; grid-column: span 2; }
    </style>
</head>
<body>

<div class="game-area">
    <div id="scoreText"></div>
    
    <div class="square-container" id="squaresWrapper">
        <div id="targetSquare" class="unanswered">
            <span id="answerText"></span>
        </div>
        <div id="userSquare">
            <span id="userAnswerText"></span>
        </div>
    </div>

    <div id="realtimeRow">
        <span id="realtimeMatch"></span>
    </div>
    
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
            <div class="preview-container" id="previewContainer">
                <div id="colorPreview"></div>
            </div>
        </div>
        <div id="adviceText"></div>
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button><button class="key-btn">1</button><button class="key-btn">2</button><button class="key-btn">3</button>
        <button class="key-btn">4</button><button class="key-btn">5</button><button class="key-btn">6</button><button class="key-btn">7</button>
        <button class="key-btn">8</button><button class="key-btn">9</button><button class="key-btn">A</button><button class="key-btn">B</button>
        <button class="key-btn">C</button><button class="key-btn">D</button><button class="key-btn">E</button><button class="key-btn">F</button>
        <button class="key-btn key-del">DEL</button><button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';
    let submittedColor = '';
    let delTimer = null;

    const targetSquare = document.getElementById('targetSquare');
    const answerText = document.getElementById('answerText');
    const userSquare = document.getElementById('userSquare');
    const userAnswerText = document.getElementById('userAnswerText');
    const scoreText = document.getElementById('scoreText');
    const realtimeRow = document.getElementById('realtimeRow');
    const realtimeMatch = document.getElementById('realtimeMatch');
    const inputField = document.getElementById('colorInput');
    const previewContainer = document.getElementById('previewContainer');
    const colorPreview = document.getElementById('colorPreview');
    const adviceText = document.getElementById('adviceText');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16), g = parseInt(hex.substring(2, 4), 16), b = parseInt(hex.substring(4, 6), 16);
        return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        const diffR = r1 - r2, diffG = g1 - g2, diffB = b1 - b2;
        const distance = Math.sqrt(diffR * diffR + diffG * diffG + diffB * diffB);
        const maxDistance = Math.sqrt(255 * 255 + 255 * 255 + 255 * 255);
        return (Math.max(0, (1 - (distance / maxDistance)) * 100)).toFixed(1);
    }

    function getDetailedAdvice(targetHex, userHex) {
        const tr = parseInt(targetHex.substring(0, 2), 16), tg = parseInt(targetHex.substring(2, 4), 16), tb = parseInt(targetHex.substring(4, 6), 16);
        const ur = parseInt(userHex.substring(0, 2), 16), ug = parseInt(userHex.substring(2, 4), 16), ub = parseInt(userHex.substring(4, 6), 16);
        
        const diffR = tr - ur, diffG = tg - ug, diffB = tb - ub;
        const absR = Math.abs(diffR), absG = Math.abs(diffG), absB = Math.abs(diffB);
        const maxDiff = Math.max(absR, absG, absB);

        // 1. 完璧
        if (maxDiff === 0) return "【完璧】100%一致です！色彩感覚のマスターですね！";

        // 2. 明度：全体的に暗すぎ（もっと明るく）
        if (diffR > 40 && diffG > 40 && diffB > 40) return "【明度UP】全体的にもっと明るい色です。全ての値を大きくして光を足しましょう。";
        
        // 3. 明度：全体的に明るすぎ（もっと暗く）
        if (diffR < -40 && diffG < -40 && diffB < -40) return "【明度DOWN】全体的にもっと暗い色です。全ての値を小さくして影を強くしましょう。";

        // 4. 彩度：鮮やかすぎ（グレーに近づける）
        const uAvg = (ur + ug + ub) / 3;
        const uSat = Math.max(ur, ug, ub) - Math.min(ur, ug, ub);
        const tSat = Math.max(tr, tg, tb) - Math.min(tr, tg, tb);
        if (uSat - tSat > 60) return "【彩度DOWN】鮮やかすぎます。各値の差を縮めて、少しグレー（無彩色）に近づけましょう。";

        // 5. 彩度：くすみがち（もっと鮮やかに）
        if (tSat - uSat > 60) return "【彩度UP】色がくすんでいます。一番大きい値をさらに大きくして、色を強調しましょう。";

        // 6. 色相：赤が足りない（暖色へ）
        if (diffR > maxDiff * 0.8) return "【色相：赤】赤みが足りません。左2文字を大きくして、温かみ（暖色）を加えましょう。";

        // 7. 色相：赤が強すぎ（寒色へ）
        if (diffR < -maxDiff * 0.8) return "【色相：青緑】赤が強すぎます。左2文字を減らして、涼しげな色を目指しましょう。";

        // 8. 色相：緑が足りない
        if (diffG > maxDiff * 0.8) return "【色相：緑】緑が足りません。真ん中の2文字を大きくして、自然な明るさを足しましょう。";

        // 9. 色相：緑が強すぎ
        if (diffG < -maxDiff * 0.8) return "【色相：紫】緑が強すぎます。真ん中を減らして、赤と青の比率を上げましょう。";

        // 10. 色相：青が足りない
        if (diffB > maxDiff * 0.8) return "【色相：青】青みが足りません。右2文字を大きくして、深みや透明感を足しましょう。";

        // 11. 色相：青が強すぎ
        if (diffB < -maxDiff * 0.8) return "【色相：黄】青が強すぎます。右2文字をぐっと減らして、黄色方向に寄せましょう。";

        // 12. 色相：黄色（赤＋緑）が足りない
        if (diffR > 30 && diffG > 30 && diffB < -20) return "【色相：黄】もっと黄色っぽいです。赤と緑を増やし、青を減らしてみてください。";

        // 13. 色相：紫（赤＋青）が足りない
        if (diffR > 30 && diffB > 30 && diffG < -20) return "【色相：紫】もっと紫っぽいです。赤と青を増やし、緑を減らしましょう。";

        // 14. 色相：水色（緑＋青）が足りない
        if (diffG > 30 && diffB > 30 && diffR < -20) return "【色相：水色】もっとシアン寄りです。緑と青を増やし、赤を削りましょう。";

        // 15. 微調整（あと少し）
        return "【微調整】かなり近いです！あと少し数値を前後させるだけで正解に届きます。";
    }

    function updatePreview() {
        const val = inputField.value;
        if (val.length === 6) {
            colorPreview.style.backgroundColor = '#' + val;
            previewContainer.classList.add('active');
            if (isAnswered) {
                const match = calculateMatch(targetColor, val);
                realtimeMatch.textContent = match + '%';
                adviceText.textContent = getDetailedAdvice(targetColor, val);
            }
        } else {
            previewContainer.classList.remove('active');
            if (isAnswered) {
                realtimeMatch.textContent = '---%';
            }
        }
    }

    function initGame() {
        isAnswered = false;
        submittedColor = '';
        targetColor = generateRandomColor();
        scoreText.classList.remove('show');
        adviceText.classList.remove('show');
        realtimeRow.classList.remove('show');
        userSquare.classList.remove('show');
        targetSquare.classList.add('unanswered');
        answerText.style.opacity = 0;
        userAnswerText.style.opacity = 0;

        setTimeout(() => {
            targetSquare.style.backgroundColor = '#' + targetColor;
            answerText.textContent = '#' + targetColor;
            answerText.style.color = getContrastColor(targetColor);
            inputField.value = '';
            inputField.disabled = false;
            updatePreview();
            inputField.focus();
        }, 200);
    }

    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; 

            isAnswered = true;
            submittedColor = userInput; // 提出時の色を固定
            const match = calculateMatch(targetColor, userInput);
            
            scoreText.textContent = match + '%';
            scoreText.classList.add('show');
            adviceText.textContent = getDetailedAdvice(targetColor, userInput);
            adviceText.classList.add('show');

            targetSquare.classList.remove('unanswered');
            answerText.style.opacity = 1;

            userSquare.style.backgroundColor = '#' + userInput;
            userAnswerText.textContent = '#' + userInput;
            userAnswerText.style.color = getContrastColor(userInput);
            userAnswerText.style.opacity = 1;
            userSquare.classList.add('show');

            realtimeMatch.textContent = match + '%';
            realtimeRow.classList.add('show');
        } else {
            initGame();
        }
    }

    inputField.addEventListener('input', function() {
        let val = this.value;
        const start = this.selectionStart;
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).toUpperCase().replace(/[^0-9A-F]/g, '');
        this.value = val.substring(0, 6);
        this.setSelectionRange(start, start);
        updatePreview(); 
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleEnter(); });

    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            e.preventDefault();
            const keyText = btn.textContent;
            if (keyText === 'Enter') {
                handleEnter();
            } else if (keyText === 'DEL') {
                const start = inputField.selectionStart, val = inputField.value;
                if (start > 0) {
                    inputField.value = val.slice(0, start - 1) + val.slice(start);
                    inputField.setSelectionRange(start - 1, start - 1);
                }
                updatePreview();
                delTimer = setTimeout(() => { inputField.value = ''; updatePreview(); }, 600);
            } else if (inputField.value.length < 6) {
                const start = inputField.selectionStart, val = inputField.value;
                inputField.value = val.slice(0, start) + keyText + val.slice(start);
                inputField.setSelectionRange(start + 1, start + 1);
                updatePreview();
            }
        });
        btn.addEventListener('pointerup', () => clearTimeout(delTimer));
        btn.addEventListener('pointerleave', () => clearTimeout(delTimer));
    });

    initGame();
</script>

</body>
</html>
