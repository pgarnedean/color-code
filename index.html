<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        /* スコア表示の滑らかな出現 */
        #scoreText {
            font-size: clamp(32px, 8vh, 60px);
            font-weight: bold;
            color: #333;
            margin-bottom: 2vh;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            height: 1.2em; /* 高さを確保してガタつきを防止 */
        }
        #scoreText.show {
            opacity: 1;
            transform: translateY(0);
        }

        .square-container {
            display: flex;
            gap: 0; /* JSで動的に制御 */
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 3vh;
            transition: gap 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #targetSquare, #userSquare {
            width: 35vh; 
            height: 35vh;
            max-width: 40vw; 
            max-height: 400px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
        }

        /* 未回答時の中央正方形 */
        #targetSquare.unanswered {
            width: 45vh;
            height: 45vh;
            max-width: 80vw;
            max-height: 500px;
        }

        #userSquare {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            width: 0; /* 最初は幅ゼロ */
            margin-left: 0;
        }
        #userSquare.show {
            opacity: 1;
            transform: scale(1);
            width: 35vh;
            margin-left: 3vw;
        }

        #answerText, #userAnswerText {
            font-size: clamp(18px, 4vh, 32px);
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 10%;
            transition: opacity 0.5s ease 0.2s; /* 少し遅れて表示 */
        }

        /* リアルタイム表示の滑らかさ */
        #realtimeRow {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 8vh;
            margin-top: 1vh;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        #realtimeRow.show { opacity: 1; }

        #realtimeCode {
            font-family: monospace;
            font-size: clamp(20px, 4vh, 34px);
            font-weight: bold;
            color: #333;
            margin-right: 20px;
            transition: color 0.3s ease;
        }

        #realtimeMatch {
            font-size: clamp(24px, 5vh, 40px);
            font-weight: bold;
            color: #333;
            min-width: 3em;
            transition: color 0.3s ease;
        }

        .input-container {
            margin-top: 2vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #colorInput {
            width: clamp(200px, 40vw, 400px);
            height: clamp(50px, 8vh, 80px);
            font-size: clamp(24px, 5vh, 42px);
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
            transition: border-color 0.3s;
        }
        #colorInput:focus { border-color: #888; }

        /* 円のプレビューを滑らかに横から出すためのコンテナ */
        .preview-container {
            width: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s;
        }
        .preview-container.active {
            width: clamp(65px, 10vh, 100px);
            margin-left: 15px;
        }

        #colorPreview {
            width: clamp(50px, 8vh, 80px); 
            height: clamp(50px, 8vh, 80px);
            border-radius: 50%;
            border: 2px solid #ccc;
            box-sizing: border-box;
            background-color: transparent;
            transition: background-color 0.3s ease;
        }

        #adviceText {
            margin-top: 1.5vh;
            font-size: clamp(14px, 2.5vh, 20px);
            color: #444;
            text-align: center;
            width: 90%;
            max-width: 600px;
            font-weight: bold;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #adviceText.show { opacity: 1; transform: translateY(0); }

        #customKeyboard {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            max-width: 320px;
        }

        @media (max-width: 768px) {
            #customKeyboard { display: grid; }
        }

        @media (max-height: 750px), (max-width: 400px) {
            #targetSquare.unanswered { width: 160px; height: 160px; }
            #targetSquare, #userSquare.show { width: 130px; height: 130px; }
            #answerText, #userAnswerText { font-size: 20px; bottom: 15px; }
            .square-container { margin-bottom: 5px; }
            #colorInput { width: 220px; height: 50px; font-size: 26px; }
            #colorPreview { width: 50px; height: 50px; }
            .preview-container.active { width: 60px; margin-left: 10px; }
            #realtimeRow { height: 50px; margin-top: 5px; }
            #adviceText { margin-top: 5px; font-size: 13px; }
            .key-btn { padding: 10px 0; font-size: 20px; }
            .input-container { margin-top: 10px; }
            body { overflow-y: auto; }
        }

        /* ボタンのスタイル維持 */
        .key-btn {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 22px;
            font-family: monospace;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #ddd;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent; 
        }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ddd; }
        .key-del { background: #ffebee; border-color: #ffcdd2; color: #d32f2f; box-shadow: 0 3px 0 #ffcdd2; grid-column: span 2; }
        .key-enter { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; box-shadow: 0 3px 0 #c8e6c9; grid-column: span 2; }
    </style>
</head>
<body>

<div class="game-area">
    <div id="scoreText"></div>
    
    <div class="square-container" id="squaresWrapper">
        <div id="targetSquare" class="unanswered">
            <span id="answerText"></span>
        </div>
        <div id="userSquare">
            <span id="userAnswerText"></span>
        </div>
    </div>

    <div id="realtimeRow">
        <span id="realtimeCode"></span>
        <span id="realtimeMatch"></span>
    </div>
    
    <div class="input-container">
        <div class="input-wrapper" id="inputWrapper">
            <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
            <div class="preview-container" id="previewContainer">
                <div id="colorPreview"></div>
            </div>
        </div>
        <div id="adviceText"></div>
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button>
        <button class="key-btn">1</button>
        <button class="key-btn">2</button>
        <button class="key-btn">3</button>
        <button class="key-btn">4</button>
        <button class="key-btn">5</button>
        <button class="key-btn">6</button>
        <button class="key-btn">7</button>
        <button class="key-btn">8</button>
        <button class="key-btn">9</button>
        <button class="key-btn">A</button>
        <button class="key-btn">B</button>
        <button class="key-btn">C</button>
        <button class="key-btn">D</button>
        <button class="key-btn">E</button>
        <button class="key-btn">F</button>
        <button class="key-btn key-del">DEL</button>
        <button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';
    let delTimer = null;

    const targetSquare = document.getElementById('targetSquare');
    const answerText = document.getElementById('answerText');
    const userSquare = document.getElementById('userSquare');
    const userAnswerText = document.getElementById('userAnswerText');
    const scoreText = document.getElementById('scoreText');
    
    const realtimeRow = document.getElementById('realtimeRow');
    const realtimeCode = document.getElementById('realtimeCode');
    const realtimeMatch = document.getElementById('realtimeMatch');
    
    const inputField = document.getElementById('colorInput');
    const previewContainer = document.getElementById('previewContainer');
    const colorPreview = document.getElementById('colorPreview');
    const adviceText = document.getElementById('adviceText');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16), g = parseInt(hex.substring(2, 4), 16), b = parseInt(hex.substring(4, 6), 16);
        return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        const distance = Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
        const maxDistance = Math.sqrt(255*255 * 3);
        return (Math.max(0, (1 - (distance / maxDistance)) * 100)).toFixed(1);
    }

    function getAdvice(targetHex, userHex) {
        const tr = parseInt(targetHex.substring(0, 2), 16), tg = parseInt(targetHex.substring(2, 4), 16), tb = parseInt(targetHex.substring(4, 6), 16);
        const ur = parseInt(userHex.substring(0, 2), 16), ug = parseInt(userHex.substring(2, 4), 16), ub = parseInt(userHex.substring(4, 6), 16);
        const diffs = [tr - ur, tg - ug, tb - ub];
        const absDiffs = diffs.map(Math.abs);
        const maxDiffIdx = absDiffs.indexOf(Math.max(...absDiffs));

        if (Math.max(...absDiffs) === 0) return "完璧です！100%一致！";
        if (Math.abs((tr+tg+tb)-(ur+ug+ub)) > 200) return (tr+tg+tb) > (ur+ug+ub) ? "全体的にもっと明るい色でした。" : "全体的にもっと暗い色でした。";
        
        const labels = ["赤み", "緑色", "青み"];
        const parts = ["左の2文字", "真ん中の2文字", "右の2文字"];
        return diffs[maxDiffIdx] > 0 ? `もう少し${labels[maxDiffIdx]}が必要でした。${parts[maxDiffIdx]}を大きくしてみましょう。` : `${labels[maxDiffIdx]}が強すぎたようです。${parts[maxDiffIdx]}を小さくしてみましょう。`;
    }

    function updatePreview() {
        const val = inputField.value;
        if (val.length === 6) {
            colorPreview.style.backgroundColor = '#' + val;
            previewContainer.classList.add('active');
            if (isAnswered) {
                const match = calculateMatch(targetColor, val);
                realtimeCode.textContent = '#' + val;
                realtimeMatch.textContent = match + '%';
                userSquare.style.backgroundColor = '#' + val;
                userAnswerText.textContent = '#' + val;
                userAnswerText.style.color = getContrastColor(val);
                adviceText.textContent = getAdvice(targetColor, val);
            }
        } else {
            previewContainer.classList.remove('active');
            if (isAnswered) {
                realtimeCode.textContent = '# ??????';
                realtimeMatch.textContent = '---%';
            }
        }
    }

    function initGame() {
        isAnswered = false;
        targetColor = generateRandomColor();
        
        // リセット処理
        scoreText.classList.remove('show');
        adviceText.classList.remove('show');
        realtimeRow.classList.remove('show');
        userSquare.classList.remove('show');
        targetSquare.classList.add('unanswered');
        answerText.style.opacity = 0;

        setTimeout(() => {
            targetSquare.style.backgroundColor = '#' + targetColor;
            answerText.textContent = '#' + targetColor;
            answerText.style.color = getContrastColor(targetColor);
            inputField.value = '';
            inputField.disabled = false;
            updatePreview();
            inputField.focus();
        }, 200);
    }

    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; 

            isAnswered = true;
            const match = calculateMatch(targetColor, userInput);
            
            // スコアとアドバイスの表示
            scoreText.textContent = match + '%';
            scoreText.classList.add('show');
            adviceText.textContent = getAdvice(targetColor, userInput);
            adviceText.classList.add('show');

            // 正解の表示
            targetSquare.classList.remove('unanswered');
            answerText.style.opacity = 1;

            // ユーザー回答の表示
            userSquare.style.backgroundColor = '#' + userInput;
            userAnswerText.textContent = '#' + userInput;
            userAnswerText.style.color = getContrastColor(userInput);
            userSquare.classList.add('show');

            // リアルタイム行の表示
            realtimeCode.textContent = '#' + userInput;
            realtimeMatch.textContent = match + '%';
            realtimeRow.classList.add('show');
        } else {
            initGame();
        }
    }

    inputField.addEventListener('input', function() {
        let val = this.value.toUpperCase().replace(/[^0-9A-F]/g, '');
        this.value = val.substring(0, 6);
        updatePreview(); 
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleEnter(); });

    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            e.preventDefault();
            const keyText = btn.textContent;
            if (keyText === 'Enter') {
                handleEnter();
            } else if (keyText === 'DEL') {
                const start = inputField.selectionStart, val = inputField.value;
                if (start > 0) {
                    inputField.value = val.slice(0, start - 1) + val.slice(start);
                    inputField.setSelectionRange(start - 1, start - 1);
                }
                updatePreview();
                delTimer = setTimeout(() => { inputField.value = ''; updatePreview(); }, 600);
            } else if (inputField.value.length < 6) {
                const start = inputField.selectionStart, val = inputField.value;
                inputField.value = val.slice(0, start) + keyText + val.slice(start);
                inputField.setSelectionRange(start + 1, start + 1);
                updatePreview();
            }
        });
        btn.addEventListener('pointerup', () => clearTimeout(delTimer));
        btn.addEventListener('pointerleave', () => clearTimeout(delTimer));
    });

    initGame();
</script>

</body>
</html>
