<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 15px;
            box-sizing: border-box;
        }

        /* 2つの正方形の間の上のパーセンテージ */
        #scoreText {
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            height: 38px;
            color: #333;
            margin-bottom: 5px;
            transition: opacity 0.3s;
        }

        .square-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;
        }

        #targetSquare, #userSquare {
            width: 150px;
            height: 150px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
            transition: width 0.3s, height 0.3s;
        }

        /* 未回答時は大きめに表示 */
        #targetSquare.unanswered {
            width: 200px;
            height: 200px;
        }

        #userSquare {
            display: none;
        }

        #answerText, #userAnswerText {
            font-size: 20px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            position: absolute;
            bottom: 15px;
            transition: opacity 0.3s;
        }

        /* 結果表示時のリアルタイムプレビュー行 */
        #realtimeRow {
            display: none;
            align-items: center;
            width: 100%;
            max-width: 320px;
            height: 60px;
            margin-top: 10px;
        }

        /* realtimeRow内に移動した円の右側の余白 */
        #realtimeRow #colorPreview {
            margin-right: 15px;
        }

        #realtimeCode {
            font-family: monospace;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-right: 15px;
        }

        #realtimeMatch {
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }

        .input-container {
            margin-top: 15px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; 
        }

        #colorInput {
            width: 260px;
            height: 60px;
            font-size: 32px;
            letter-spacing: 2px;
            text-align: center;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            background-color: #fff;
        }

        #colorInput:focus {
            border-color: #888;
        }

        #colorPreview {
            width: 60px; 
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ccc;
            box-sizing: border-box;
            opacity: 0; 
            transition: opacity 0.2s, background-color 0.2s;
        }

        #adviceText {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
            text-align: center;
            width: 100%;
            max-width: 320px;
            min-height: 42px; 
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: bold;
            line-height: 1.4;
        }

        #customKeyboard {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 5px;
            width: 100%;
            max-width: 320px;
        }

        @media (max-width: 768px) {
            #customKeyboard {
                display: grid;
            }
        }

        /* スマホ等でキーボードが消えないように高さを自動縮小 */
        @media (max-height: 750px), (max-width: 400px) {
            #targetSquare.unanswered { width: 160px; height: 160px; }
            #targetSquare, #userSquare { width: 130px; height: 130px; }
            .square-container { gap: 10px; }
            #scoreText { font-size: 28px; height: 32px; }
            #colorInput { width: 220px; height: 50px; font-size: 26px; }
            #colorPreview { width: 50px; height: 50px; }
            #realtimeRow { height: 50px; margin-top: 5px; }
            #adviceText { margin-top: 5px; min-height: 38px; font-size: 13px; }
            .key-btn { padding: 10px 0; font-size: 20px; }
            .input-container { margin-top: 10px; }
        }

        .key-btn {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 22px;
            font-family: monospace;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 0 #ddd;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent; 
        }

        .key-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #ddd;
        }

        .key-del {
            grid-column: span 2;
            background: #ffebee;
            border-color: #ffcdd2;
            color: #d32f2f;
            box-shadow: 0 3px 0 #ffcdd2;
        }
        .key-del:active { box-shadow: 0 0 0 #ffcdd2; }

        .key-enter {
            grid-column: span 2;
            background: #e8f5e9;
            border-color: #c8e6c9;
            color: #2e7d32;
            box-shadow: 0 3px 0 #c8e6c9;
        }
        .key-enter:active { box-shadow: 0 0 0 #c8e6c9; }

    </style>
</head>
<body>

<div class="game-area">
    <div id="scoreText"></div>
    
    <div class="square-container" id="squaresWrapper">
        <div id="targetSquare" class="unanswered">
            <span id="answerText"></span>
        </div>
        <div id="userSquare">
            <span id="userAnswerText"></span>
        </div>
    </div>

    <div id="realtimeRow">
        <span id="realtimeCode"></span>
        <span id="realtimeMatch"></span>
    </div>
    
    <div class="input-container">
        <div class="input-wrapper" id="inputWrapper">
            <input type="text" id="colorInput" maxlength="6" placeholder="000000" autocomplete="off" autofocus inputmode="none">
            <div id="colorPreview"></div>
        </div>
        <div id="adviceText"></div>
    </div>

    <div id="customKeyboard">
        <button class="key-btn">0</button>
        <button class="key-btn">1</button>
        <button class="key-btn">2</button>
        <button class="key-btn">3</button>
        
        <button class="key-btn">4</button>
        <button class="key-btn">5</button>
        <button class="key-btn">6</button>
        <button class="key-btn">7</button>
        
        <button class="key-btn">8</button>
        <button class="key-btn">9</button>
        <button class="key-btn">A</button>
        <button class="key-btn">B</button>
        
        <button class="key-btn">C</button>
        <button class="key-btn">D</button>
        <button class="key-btn">E</button>
        <button class="key-btn">F</button>
        
        <button class="key-btn key-del">DEL</button>
        <button class="key-btn key-enter">Enter</button>
    </div>
</div>

<script>
    let isAnswered = false;
    let targetColor = '';
    let delTimer = null;

    const targetSquare = document.getElementById('targetSquare');
    const answerText = document.getElementById('answerText');
    const userSquare = document.getElementById('userSquare');
    const userAnswerText = document.getElementById('userAnswerText');
    const scoreText = document.getElementById('scoreText');
    
    const realtimeRow = document.getElementById('realtimeRow');
    const realtimeCode = document.getElementById('realtimeCode');
    const realtimeMatch = document.getElementById('realtimeMatch');
    
    const inputWrapper = document.getElementById('inputWrapper');
    const inputField = document.getElementById('colorInput');
    const colorPreview = document.getElementById('colorPreview');
    const adviceText = document.getElementById('adviceText');

    function generateRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    function calculateMatch(hex1, hex2) {
        const r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
        const r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
        
        const diffR = r1 - r2;
        const diffG = g1 - g2;
        const diffB = b1 - b2;
        
        const distance = Math.sqrt(diffR * diffR + diffG * diffG + diffB * diffB);
        const maxDistance = Math.sqrt(255 * 255 + 255 * 255 + 255 * 255);
        
        let matchPercent = (1 - (distance / maxDistance)) * 100;
        
        if (matchPercent < 0) matchPercent = 0;
        return matchPercent.toFixed(1);
    }

    function getAdvice(targetHex, userHex) {
        const tr = parseInt(targetHex.substring(0, 2), 16), tg = parseInt(targetHex.substring(2, 4), 16), tb = parseInt(targetHex.substring(4, 6), 16);
        const ur = parseInt(userHex.substring(0, 2), 16), ug = parseInt(userHex.substring(2, 4), 16), ub = parseInt(userHex.substring(4, 6), 16);

        const diffR = tr - ur;
        const diffG = tg - ug;
        const diffB = tb - ub;

        const absR = Math.abs(diffR);
        const absG = Math.abs(diffG);
        const absB = Math.abs(diffB);

        const maxDiff = Math.max(absR, absG, absB);

        if (maxDiff === 0) return "完璧です！100%一致！カラーコードの達人ですね！";
        
        let advices = [];

        if (Math.abs((tr + tg + tb) - (ur + ug + ub)) > 200 && maxDiff < 100) {
            if ((tr + tg + tb) > (ur + ug + ub)) {
                advices = [
                    "全体的にもっと明るい色でした。RGBすべての数字を大きく（F寄りに）してみましょう！",
                    "カラーコードは白（FFFFFF）に近づくほど明るくなります。全体的にもう少し大きな英数字を使うのがコツです。",
                    "もう少し白みがかった明るい色です。3色ともFに近い値にシフトさせると近づきますよ。"
                ];
            } else {
                advices = [
                    "全体的にもっと暗い色でした。RGBすべての数字を小さく（0寄りに）してみましょう！",
                    "カラーコードは黒（000000）に近づくほど暗くなります。全体的にもう少し小さな数字を使うのがコツです。",
                    "もう少し黒みがかった落ち着いた色です。3色とも0に近い値にシフトさせると近づきます。"
                ];
            }
            return advices[Math.floor(Math.random() * advices.length)];
        }

        const isTargetGray = Math.abs(tr - tg) < 20 && Math.abs(tg - tb) < 20;
        if (isTargetGray && maxDiff > 30) {
            advices = [
                "正解は無彩色（グレー・白・黒）に近い色でした！2桁ごとの数値をすべて同じくらいに揃えるのがポイントです。",
                "グレー系の色は「R=G=B」になります（例: 888888）。3つの値をもっと均等にしてみましょう！",
                "どれかの色が強すぎたようです。白黒グレーは3要素（赤・緑・青）のバランスを均一に保つと作れます。"
            ];
            return advices[Math.floor(Math.random() * advices.length)];
        }

        if (maxDiff === absR) {
            if (diffR > 0) {
                advices = [
                    "最初の2桁（赤）の数値を大きく（F寄りに）すると正解でした！0よりFに近づけると赤が強くなります。",
                    "もう少し赤みが必要でしたね。左の2文字を大きく（9やA〜Fへ）してみましょう。",
                    "光の三原色である『赤』が足りません。最初の2桁をFに近づけてみてください。",
                    "一番左の「R(赤)」を強めるのが今回の正解への近道でした！",
                    "赤の成分が不足しています。0〜Fの16進数で、最初の2桁をもっとF方向へ進めてみましょう。"
                ];
            } else {
                advices = [
                    "最初の2桁（赤）の数値を小さく（0寄りに）すると正解に近づきました。",
                    "赤みが強すぎたようです。左の2文字をもっと0に近づけてみましょう。",
                    "光の三原色の『赤』を減らすのがポイントです。最初の2桁の数値を下げてみてください。",
                    "一番左の「R(赤)」の主張が強すぎました。もう少し数値を0に寄せてみましょう。",
                    "もう少し赤を抑えると、全体の色が正解にピタッと合います！"
                ];
            }
        } else if (maxDiff === absG) {
            if (diffG > 0) {
                advices = [
                    "真ん中の2桁（緑）の数値を大きく（F寄りに）すると正解でした！",
                    "もう少し緑色が必要でした。真ん中の2文字を大きく（9やA〜Fへ）してみましょう。",
                    "光の三原色である『緑』が足りません。真ん中の2桁をFに近づけてみてください。",
                    "真ん中の「G(緑)」を強めるのが今回の正解への近道でした！",
                    "緑の成分が不足しています。真ん中の2桁を思い切ってF寄りにしてみてください。"
                ];
            } else {
                advices = [
                    "真ん中の2桁（緑）の数値を小さく（0寄りに）すると正解に近づきました。",
                    "緑が強すぎたようです。真ん中の2文字をもっと0に近づけてみましょう。",
                    "光の三原色の『緑』を減らすのがポイントです。真ん中の2桁の数値を下げてみてください。",
                    "真ん中の「G(緑)」の主張が強すぎました。もう少し数値を0に寄せてみましょう。",
                    "もう少し緑を抑えると、全体の色が正解にグッと近づきました！"
                ];
            }
        } else {
            if (diffB > 0) {
                advices = [
                    "最後の2桁（青）の数値を大きく（F寄りに）すると正解でした！",
                    "もう少し青みが必要でした。右の2文字を大きく（9やA〜Fへ）してみましょう。",
                    "光の三原色である『青』が足りません。最後の2桁をFに近づけてみてください。",
                    "一番右の「B(青)」を強めるのが今回の正解への近道でした！",
                    "もっと青みが必要です！最後の2桁を思い切ってF寄りにしてみてください。"
                ];
            } else {
                advices = [
                    "最後の2桁（青）の数値を小さく（0寄りに）すると正解に近づきました。",
                    "青が強すぎたようです。右の2文字をもっと0に近づけてみましょう。",
                    "光の三原色の『青』を減らすのがポイントです。最後の2桁の数値を下げてみてください。",
                    "一番右の「B(青)」の主張が強すぎました。もう少し数値を0に寄せてみましょう。",
                    "もう少し青を抑えると、全体の色が正解にピタッと合いました！"
                ];
            }
        }

        return advices[Math.floor(Math.random() * advices.length)];
    }

    function updatePreview() {
        const val = inputField.value;
        if (val.length === 6) {
            colorPreview.style.backgroundColor = '#' + val;
            colorPreview.style.opacity = '1';
            
            // 回答後（isAnsweredがtrue）の場合、間のプレビュー行をリアルタイム更新
            if (isAnswered) {
                const match = calculateMatch(targetColor, val);
                realtimeCode.textContent = '#' + val;
                realtimeMatch.textContent = match + '%';
            }
        } else {
            colorPreview.style.opacity = '0';
            
            if (isAnswered) {
                realtimeCode.textContent = '';
                realtimeMatch.textContent = '';
            }
        }
    }

    function initGame() {
        targetColor = generateRandomColor();
        targetSquare.style.backgroundColor = '#' + targetColor;
        answerText.textContent = '#' + targetColor;
        answerText.style.color = getContrastColor(targetColor);
        answerText.style.opacity = 0;
        
        targetSquare.classList.add('unanswered');
        userSquare.style.display = 'none';
        scoreText.style.opacity = 0;

        // 円を入力欄の横に戻す
        inputWrapper.appendChild(colorPreview);
        realtimeRow.style.display = 'none';

        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();

        updatePreview();
        adviceText.style.opacity = 0;

        isAnswered = false;
    }

    function handleEnter() {
        if (!isAnswered) {
            let userInput = inputField.value;
            if (userInput.length !== 6) return; 

            // マッチ率の計算と表示（上部固定）
            const match = calculateMatch(targetColor, userInput);
            scoreText.textContent = match + '%';
            scoreText.style.opacity = 1;

            // 正方形のレイアウト変更（問題・ユーザー回答の表示）
            targetSquare.classList.remove('unanswered');
            answerText.style.opacity = 1;

            userSquare.style.display = 'flex';
            userSquare.style.backgroundColor = '#' + userInput;
            userAnswerText.textContent = '#' + userInput;
            userAnswerText.style.color = getContrastColor(userInput);
            userAnswerText.style.opacity = 1;

            // 円を中間行に移動
            realtimeRow.style.display = 'flex';
            realtimeRow.insertBefore(colorPreview, realtimeRow.firstChild);
            
            // リアルタイム行の初期値設定
            realtimeCode.textContent = '#' + userInput;
            realtimeMatch.textContent = match + '%';

            adviceText.textContent = getAdvice(targetColor, userInput);
            adviceText.style.opacity = 1;
            
            isAnswered = true;
        } else {
            // isAnswered が true の状態でエンターを押すと次の問題へ
            initGame();
        }
    }

    inputField.addEventListener('input', function() {
        let val = this.value;
        const start = this.selectionStart;
        
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
        val = val.toUpperCase();
        val = val.replace(/[^0-9A-F]/g, '');
        if (val.length > 6) val = val.substring(0, 6);
        
        this.value = val;
        this.setSelectionRange(start, start); 
        updatePreview(); 
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            handleEnter();
        }
    });

    document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('mousedown', function(e) {
            e.preventDefault(); 
        });

        if (btn.classList.contains('key-del')) {
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                delTimer = setTimeout(() => {
                    inputField.value = '';
                    updatePreview(); 
                    delTimer = null;
                }, 600);
            });

            const handleDel = () => {
                if (delTimer) {
                    clearTimeout(delTimer);
                    const start = inputField.selectionStart;
                    const end = inputField.selectionEnd;
                    const val = inputField.value;
                    
                    if (start === end && start > 0) {
                        inputField.value = val.slice(0, start - 1) + val.slice(end);
                        inputField.focus();
                        inputField.setSelectionRange(start - 1, start - 1);
                    } else if (start !== end) {
                        inputField.value = val.slice(0, start) + val.slice(end);
                        inputField.focus();
                        inputField.setSelectionRange(start, start);
                    }
                    
                    updatePreview(); 
                    delTimer = null;
                }
            };

            btn.addEventListener('touchend', function(e) {
                e.preventDefault();
                handleDel();
            });
            
            btn.addEventListener('mousedown', function(e) {
                e.preventDefault();
                delTimer = setTimeout(() => {
                    inputField.value = '';
                    updatePreview(); 
                    delTimer = null;
                }, 600);
            });

            btn.addEventListener('mouseup', function(e) {
                handleDel();
            });
        } else {
            btn.addEventListener('click', function(e) {
                e.preventDefault(); 
                const keyText = this.textContent;

                if (keyText === 'Enter') {
                    handleEnter();
                } else if (inputField.value.length < 6) {
                    const start = inputField.selectionStart;
                    const end = inputField.selectionEnd;
                    const val = inputField.value;
                    
                    inputField.value = val.slice(0, start) + keyText + val.slice(end);
                    inputField.focus();
                    inputField.setSelectionRange(start + 1, start + 1);
                    
                    updatePreview(); 
                }
            });
        }
    });

    initGame();
</script>

</body>
</html>
